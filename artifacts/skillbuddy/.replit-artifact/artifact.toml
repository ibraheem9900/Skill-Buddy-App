kind = "mobile"
previewPath = "/"
title = "SkillBuddy"
version = "1.0.0"
id = "artifacts/skillbuddy"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 23494

[services.development]
run = "pnpm --filter @workspace/skillbuddy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skillbuddy", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/skillbuddy", "run", "serve" ]

[services.env]
PORT = "23494"
BASE_PATH = "/"
